{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}Register - RATS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6">
        <div class="card card-custom p-4 shadow-lg border-0">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus text-success fs-1"></i>
                    <h2 class="fw-bold mt-2 text-primary-emphasis">Join as Applicant</h2>
                    <p class="text-secondary small">Create an account to search jobs and track applications</p>
                </div>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    
                    <div class="d-grid mb-3 mt-4">
                        <button type="submit" class="btn btn-secondary py-2 fw-semibold">
                            <i class="bi bi-check-circle me-2"></i>Create Account
                        </button>
                    </div>
                </form>
                
                <div class="text-center pt-2 border-top border-light-subtle mt-4">
                    <p class="text-secondary small mb-0">Already have an account? 
                        <a href="{% url 'accounts:login' %}" class="text-decoration-none text-success fw-semibold">Sign In here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
