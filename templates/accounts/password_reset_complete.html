{% extends 'base.html' %}

{% block title %}Password Reset Complete - RATS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card card-custom p-4 shadow-lg border-0 text-center">
            <div class="card-body">
                <i class="bi bi-shield-check text-success fs-1 mb-3 d-inline-block"></i>
                <h2 class="fw-bold text-primary-emphasis mb-2">Password Updated</h2>
                <p class="text-secondary small mb-4">
                    Your password has been successfully configured. You may now proceed to log in with your new credentials.
                </p>
                <div class="d-grid">
                    <a href="{% url 'accounts:login' %}" class="btn btn-secondary py-2 fw-semibold">
                        Proceed to Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
