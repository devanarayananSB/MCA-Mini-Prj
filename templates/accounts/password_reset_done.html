{% extends 'base.html' %}

{% block title %}Reset Link Sent - RATS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card card-custom p-4 shadow-lg border-0 text-center">
            <div class="card-body">
                <i class="bi bi-envelope-check text-success fs-1 mb-3 d-inline-block"></i>
                <h2 class="fw-bold text-primary-emphasis mb-2">Check Your Inbox</h2>
                <p class="text-secondary small mb-4">
                    If an account with that email exists, we have dispatched a password reset link. Please check your spam folder if it doesn't arrive within 5 minutes.
                </p>
                <div class="d-grid">
                    <a href="{% url 'accounts:login' %}" class="btn btn-secondary py-2 fw-semibold">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
