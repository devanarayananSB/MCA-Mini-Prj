{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}Login - RATS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card card-custom p-4 shadow-lg border-0">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-success fs-1"></i>
                    <h2 class="fw-bold mt-2 text-primary-emphasis">Sign In</h2>
                    <p class="text-secondary small">Enter your email and password to access the system</p>
                </div>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-secondary small" for="rememberMe">Remember me</label>
                        </div>
                        <a href="{% url 'accounts:password_reset' %}" class="small text-decoration-none text-success fw-medium">Forgot Password?</a>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-secondary py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </div>
                </form>
                
                <div class="text-center pt-2 border-top border-light-subtle mt-4">
                    <p class="text-secondary small mb-0">Don't have an account? 
                        <a href="{% url 'accounts:register' %}" class="text-decoration-none text-success fw-semibold">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
